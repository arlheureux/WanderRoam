server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Strip /admin prefix from requests
    location /admin/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /index.html;
        
        # Rewrite asset URLs in HTML to add /admin prefix
        sub_filter_once off;
        sub_filter 'src="/' 'src="/admin/';
        sub_filter 'href="/' 'href="/admin/';
    }

    # Handle /admin without trailing slash -> redirect to /admin/
    location = /admin {
        return 301 /admin/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://wanderroam-backend:5000/api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}
