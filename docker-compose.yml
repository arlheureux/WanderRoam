# docker-compose.yml - Production version (direct ports)
# Run with: docker-compose up -d

services:
  postgres:
    image: postgres:15-alpine
    container_name: wanderroam-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - wanderroam-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: on-failure

  backend:
    image: arlheureux/wanderroam-backend:stable
    container_name: wanderroam-backend
    env_file:
      - .env
    environment:
      - TAG=stable
      - BROUTER_URL=http://wanderroam-brouter:17777/brouter
    volumes:
      - upload_data:/app/uploads
    networks:
      - wanderroam-internal
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      brouter:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  frontend:
    image: arlheureux/wanderroam-frontend:stable
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_VERSION: 0.7.1
        REACT_APP_CHANNEL: stable
        REACT_APP_GIT_COMMIT: ${GIT_COMMIT:-9e16433}
    container_name: wanderroam-frontend
    networks:
      - wanderroam-internal
    ports:
      - "3000:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  admin:
    image: arlheureux/wanderroam-admin:stable
    container_name: wanderroam-admin
    networks:
      - wanderroam-internal
    ports:
      - "4000:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  brouter:
    image: arlheureux/wanderroam-brouter:stable
    container_name: wanderroam-brouter
    networks:
      - wanderroam-internal
    ports:
      - "17777:17777"
    environment:
      - COUNTRIES=france,denmark
    volumes:
      - brouter_data:/segments4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:17777/"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: on-failure

volumes:
  postgres_data:
  upload_data:
  brouter_data:

networks:
  wanderroam-internal:
    name: wanderroam-internal
