# docker-compose.dev.yml - Development with Traefik (HTTP)
# Run with: docker-compose -f docker-compose.dev.yml up -d

services:
  traefik:
    image: traefik:v3.0
    container_name: wanderroam-traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: on-failure

  postgres:
    image: postgres:15-alpine
    container_name: wanderroam-db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - wanderroam-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: on-failure

  backend:
    image: arlheureux/wanderroam-backend:latest
    container_name: wanderroam-backend
    env_file:
      - .env
    environment:
      - TAG=latest
      - BROUTER_URL=http://wanderroam-brouter:17777/brouter
    volumes:
      - upload_data:/app/uploads
    networks:
      - wanderroam-internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.services.backend.loadbalancer.server.port=5000"
    depends_on:
      postgres:
        condition: service_healthy
      brouter:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  frontend:
    image: arlheureux/wanderroam-frontend:latest
    container_name: wanderroam-frontend
    networks:
      - wanderroam-internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=PathPrefix(`/`)"
      - "traefik.http.routers.frontend.entrypoints=web"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  admin:
    image: arlheureux/wanderroam-admin:latest
    container_name: wanderroam-admin
    networks:
      - wanderroam-internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.admin.rule=PathPrefix(`/admin`)"
      - "traefik.http.routers.admin.entrypoints=web"
      - "traefik.http.services.admin.loadbalancer.server.port=80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  brouter:
    image: arlheureux/wanderroam-brouter:latest
    container_name: wanderroam-brouter
    networks:
      - wanderroam-internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.brouter.rule=PathPrefix(`/brouter`)"
      - "traefik.http.routers.brouter.entrypoints=web"
      - "traefik.http.services.brouter.loadbalancer.server.port=17777"
    environment:
      - COUNTRIES=france,denmark
    volumes:
      - brouter_data:/segments4
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:17777/"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: on-failure

volumes:
  postgres_data:
  upload_data:
  brouter_data:

networks:
  wanderroam-internal:
    name: wanderroam-internal
